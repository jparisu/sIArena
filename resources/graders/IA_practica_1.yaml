version: 1

assignment:
  id: IA_practica_1
  notebook_function: path_finding
  author_from: file_stem
  author_pattern: null

defaults:
  oracle: dijkstra
  terrain_type: Terrain
  time_limits:
    max_seconds: 60.0

tests:
  - id: maze
    generator: MazeGenerator
    seeds: [43, 44, 45, 46, 47]
    parameters:
      n: 7
      m: 7
      min_height: 0
      max_height: 0
      min_step: 1
      abruptness: 0.0
      origin: [0, 0]
      destination: [6, 6]

  - id: dodge
    generator: MazeGenerator
    seeds: [43, 44, 45, 46, 47]
    parameters:
      n: 7
      m: 7
      min_height: 0
      max_height: 0
      min_step: 1
      abruptness: 0.0
      origin: [4, 0]
      destination: [6, 0]

  - id: jump
    generator: MazeGenerator
    seeds: [43, 44, 45, 46, 47]
    parameters:
      n: 7
      m: 7
      min_height: 0
      max_height: 3
      min_step: 3
      abruptness: 0.0
      origin: [4, 0]
      destination: [6, 0]

  - id: walk
    generator: PerlinGenerator
    seeds: [43, 44, 45, 46, 47]
    parameters:
      n: 20
      m: 20
      min_height: 0
      max_height: 10
      min_step: 2
      abruptness: 0.1
      origin: [0, 1]
      destination: [16, 15]

  - id: race
    generator: FocusedGenerator
    seeds: [43, 44, 45, 46, 47]
    parameters:
      n: 30
      m: 30
      min_height: 0
      max_height: 10
      min_step: 2
      abruptness: 0.1
      origin: [0, 0]
      destination: [29, 29]

  - id: fields
    generator: PerlinGenerator
    seeds: [43, 44, 45, 46, 47]
    parameters:
      n: 100
      m: 100
      min_height: 0
      max_height: 100
      min_step: 5
      abruptness: 0.1
      origin: [0, 0]
      destination: [99, 99]
